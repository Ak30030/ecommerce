<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <style>
    body{
      font-family:Arail;
      margin-top: 0px;
      margin-bottom: 0px;
    }

    .send-button{
      background-color:rgb(25, 135, 84);;
      color:white;
      font-size:15px;
      cursor: pointer;
      padding:12px 20px;
      margin-left:10px;
      border:none;
      border-radius:10px
      
      
    }

    .chat-input{
      padding:12px 15px;
      border-radius: 10px;
      border-width: 1px;
      font-size:15px ;
      
      flex-grow: 1;
    }

    .chat-input-container{
      display:flex;
      margin-top: 60px;
    }

    .app-container{
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;

      height:100vh;
      display: flex;
      flex-direction:column ;
    }
    .chat-message-user{
      display:flex;
      justify-content:end ;
      align-items: start;
    }

    .chat-message-robot{
      display: flex;
      align-items: start;

    }
    .chat-message-text{
      background-color:rgb(238, 238, 238);
      padding:15px 20px ;
      border-radius: 10px;
      margin-right: 10px;
      margin-right: 10px;
      margin-bottom: 20px;
      max-width:300px ;
      
    }
    .chat-message-profile{
      width: 45px;
    }

    .chat-messages-container{
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;
    
    }

  </style>
  <body>
    <div class="js-container"></div>

    <!-- supersimpledev scripts removed per request -->
    <script type="text/babel">
      function ChatInput({ChatMessages, setChatMessages}) {
        const [inputText, setInputText]= React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);

        }

        function sendMessage() {
          const newChatMessages =[
            ...ChatMessages,
          {
            message:inputText,
            sender:'user',
            id:crypto.randomUUID()
          }
          ]; 

            setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
        setChatMessages([
            ...newChatMessages,
          {
            message:response,
            sender:'robot',
            id:crypto.randomUUID()
          }
          ]);

          setInputText('');
        
    

        }

        return (

        <div className="chat-input-container">
          <input
           placeholder = "Send a message to Chatbox" 
           size ="30"
           onChange={saveInputText}
           value={inputText}
           className="chat-input"
           />

          <button 
          onClick={sendMessage }
          className="send-button"
          >Send</button>
        </div> 
        );
      }
      function ChatMessage({message,sender}) {
        // const message = props.message;
       //const sender = props.sender;
      //const {message,sender} = props;
        /*
       if(sender==='robot') {
        return(
           <div>
            <img  src= "robot.png" width = "50"/>
           {message}
          </div>

        );

       }
          */
        return (
          <div className=
          {sender ==='user'
            ? 'chat-message-user' 
            : 'chat-message-robot'
          }>
            {sender ==='robot' &&
             (<img  src= "robot.png"
             className="chat-message-profile" />

             )}
             <div className="chat-message-text">
                {message}
           </div>
           {sender === 'user' &&
            (<img  src= "user.png"
            className="chat-message-profile" />

            )}
          </div>

        );
      }

      function ChatMessagesList({ChatMessages}) {
       const chatMessagesRef =  React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if(containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [ChatMessages]);

        return(
            <div className="chat-messages-container"
             ref={chatMessagesRef}>
             
            {ChatMessages.map((chatMessage) => {
                return (
            <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                  />
              );
              })}
              </div>
         );

      }

      function App() {

          const [ChatMessages,setChatMessages] = React.useState([{
          message: 'hello chatbot',
          sender: 'user',
          id:'id1'
        },{
          message:'Hello! How can I help you?',
          sender:'robot',
          id:'id2'
        },{
          message:'can you get me today date?',
          sender:'user',
          id:'id3'
        },{
          message:'Today is January 29',
          sender:'robot',
          id:'id4'
        },{
          message:'how about flip a coin?',
          sender:'user',
          id:'id5'
        },{
          message:'Sure! You got tails',
          sender:'robot',
          id:'id6'
        },{
          message:'okay thank you',
          sender:'user',
          id:'id7'

        },{
          message:'No problem! Let me know if you need help with anything else!',
          sender:'robot',
          id:'id8'
        }]
        )
       //const [ChatMessages,setChatMessage] = array;
        //const ChatMessages = array[0];
        //const setChatMessages = array[1];


            return(
            <div className="app-container">
          <ChatMessagesList
          ChatMessages ={ChatMessages}
          />
              <ChatInput
          ChatMessages ={ChatMessages}
          setChatMessages={setChatMessages}
          />
        </div>
            );
            }
          


      const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);

    </script> 
  </body>
</html>
